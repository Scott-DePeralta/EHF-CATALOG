name: Auto-Update EHF Catalog

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # silence Node.js 20 warning

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run builder
        env:
          NETLIFY_ACCESS_TOKEN: ${{ secrets.NETLIFY_ACCESS_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: python build.py

      - name: Commit updated files
        run: |
          git config user.name  "EHF Auto Bot"
          git config user.email "bot@exclusivehempfarms.com"
          git add index.html last_hash.txt 2>/dev/null || true
          git diff --staged --quiet && echo "Nothing to commit — sheet unchanged" && exit 0
          git commit -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
