name: Auto-Update EHF Catalog

on:
  schedule:
    - cron: '0 19 * * *'   # Once daily at 12:00 PM Pacific (19:00 UTC)
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force full rebuild even if sheet unchanged'
        required: false
        default: 'true'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run builder
        env:
          NETLIFY_ACCESS_TOKEN: ${{ secrets.NETLIFY_ACCESS_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          FORCE_REBUILD: ${{ github.event_name == 'workflow_dispatch' && inputs.force_rebuild || 'false' }}
        run: python build.py

      - name: Commit updated files
        run: |
          git config user.name  "EHF Auto Bot"
          git config user.email "bot@exclusivehempfarms.com"
          git add index.html last_hash.txt 2>/dev/null || true
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase --autostash origin main || true
          git push origin main || echo "Push skipped — site already deployed via Netlify"
